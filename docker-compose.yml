version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-musicdash}
      POSTGRES_USER: ${POSTGRES_USER:-musicuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musicpass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-musicuser} -d ${POSTGRES_DB:-musicdash}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-musicuser}:${POSTGRES_PASSWORD:-musicpass}@db:5432/${POSTGRES_DB:-musicdash}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  pgdata:
